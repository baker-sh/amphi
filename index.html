<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amphi Festival 2026 · Running Order</title>
<!-- Web fonts as progressive enhancement; system serif fallbacks keep it usable offline -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel:wght@500;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#08080b;
    --panel:#0f0f14;
    --panel-2:#14141b;
    --ink:#d9d4c8;
    --ink-dim:#8f8a7e;
    --blood:#8f1620;
    --blood-lit:#c0303c;
    --gold:#b89b45;
    --line:#2a2530;
    --shadow:rgba(0,0,0,.6);
    --sel:#3a121a;
    --sel-line:#7b2130;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 700px at 50% -10%, #1a1320 0%, transparent 60%),
      radial-gradient(900px 600px at 100% 100%, #12101a 0%, transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:"EB Garamond", Georgia, "Times New Roman", serif;
    font-size:18px;
    line-height:1.4;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Header ---------- */
  header.masthead{
    text-align:center;
    padding:34px 16px 18px;
    position:relative;
  }
  .kicker{
    font-family:"Cinzel", serif;
    letter-spacing:.42em;
    text-transform:uppercase;
    font-size:13px;
    color:var(--gold);
    margin:0 0 8px;
    padding-left:.42em;
  }
  h1.title{
    font-family:"Pirata One","UnifrakturCook", "Times New Roman", serif;
    font-weight:400;
    font-size:clamp(44px, 9vw, 88px);
    line-height:.95;
    margin:0;
    color:var(--ink);
    text-shadow:0 2px 0 #000, 0 0 34px rgba(160,30,40,.35);
  }
  .title .amphi{color:#efe9dc}
  .subtitle{
    font-family:"Cinzel", serif;
    letter-spacing:.3em;
    text-transform:uppercase;
    font-size:14px;
    color:var(--ink-dim);
    margin-top:10px;
  }
  .rule{
    width:min(680px,90%);
    height:1px;
    margin:20px auto 0;
    background:linear-gradient(90deg,transparent,var(--blood) 20%,var(--gold) 50%,var(--blood) 80%,transparent);
    opacity:.7;
  }

  /* ---------- Control bar ---------- */
  .toolbar{
    position:sticky; top:0; z-index:20;
    display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:center;
    padding:14px 16px;
    background:rgba(8,8,11,.82);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .count-badge{
    font-family:"Cinzel",serif; font-size:14px; letter-spacing:.08em;
    color:var(--ink-dim);
  }
  .count-badge b{color:var(--gold); font-size:19px}
  button{
    font-family:"Cinzel", serif;
    font-size:13px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--ink);
    background:linear-gradient(180deg,var(--panel-2),#0b0b10);
    border:1px solid var(--line);
    padding:10px 18px;
    cursor:pointer;
    transition:all .16s ease;
  }
  button:hover{border-color:var(--blood-lit); color:#fff; box-shadow:0 0 18px rgba(160,30,40,.28)}
  button:active{transform:translateY(1px)}
  button.primary{
    background:linear-gradient(180deg,var(--blood),#5c0d16);
    border-color:var(--blood-lit); color:#f4e9dc;
    font-weight:700;
  }
  button.primary:hover{box-shadow:0 0 22px rgba(192,48,60,.5)}

  /* ---------- Layout ---------- */
  main{max-width:1180px; margin:0 auto; padding:26px 16px 80px}
  .days{display:grid; grid-template-columns:1fr 1fr; gap:26px}
  @media(max-width:860px){ .days{grid-template-columns:1fr} }

  .day{
    background:linear-gradient(180deg, rgba(20,20,27,.7), rgba(12,12,16,.7));
    border:1px solid var(--line);
    box-shadow:0 20px 50px -30px var(--shadow), inset 0 1px 0 rgba(255,255,255,.02);
  }
  .day-head{
    text-align:center; padding:16px 10px 12px;
    border-bottom:1px solid var(--line);
    background:
      linear-gradient(180deg, rgba(143,22,32,.18), transparent);
  }
  .day-head .dow{
    font-family:"Pirata One", serif; font-size:34px; letter-spacing:.02em;
    color:#efe9dc; margin:0; line-height:1;
  }
  .day-head .date{
    font-family:"Cinzel",serif; letter-spacing:.28em; text-transform:uppercase;
    font-size:11px; color:var(--gold); margin-top:6px;
  }

  .stage{padding:6px 0 4px}
  .stage-head{
    display:flex; align-items:baseline; justify-content:space-between;
    padding:14px 18px 8px;
  }
  .stage-name{
    font-family:"Cinzel",serif; font-weight:700; letter-spacing:.16em;
    text-transform:uppercase; font-size:15px;
  }
  .stage-name::before{content:"✠ "; color:var(--blood-lit)}
  .stage-doors{ font-size:12px; color:var(--ink-dim); letter-spacing:.06em }

  ul.acts{list-style:none; margin:0; padding:0}
  li.act{
    display:grid; grid-template-columns:26px 1fr auto auto; align-items:center; gap:10px;
    padding:9px 18px; cursor:pointer;
    border-top:1px solid rgba(42,37,48,.5);
    transition:background .14s ease;
    user-select:none;
  }
  li.act:hover{background:rgba(143,22,32,.10)}
  li.act.sel{background:linear-gradient(90deg, var(--sel), rgba(58,18,26,.25)); }
  li.act.sel::after{content:""}
  /* Selected AND overlapping another selected set on the same day */
  li.act.sel.clash{
    background:linear-gradient(90deg, rgba(122,33,48,.55), rgba(58,18,26,.3));
    box-shadow:inset 3px 0 0 var(--blood-lit);
  }
  li.act.sel.clash .band{color:#ffd7db}
  li.act.sel.clash .band::after{
    content:"⚠ clash";
    font-family:"Cinzel",serif; font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    color:#ff9aa2; margin-left:10px; vertical-align:middle;
  }
  .mark{
    width:20px; height:20px; border:1px solid var(--sel-line);
    display:grid; place-items:center; color:transparent;
    font-size:14px; line-height:1; background:#0a0a0d;
  }
  li.act.sel .mark{color:var(--gold); border-color:var(--gold); background:#1a0c10}
  .mark::after{content:"✝"}
  .band{
    font-size:18.5px; letter-spacing:.01em;
  }
  li.act.sel .band{color:#fff; text-shadow:0 0 12px rgba(184,155,69,.25)}
  .time{
    font-family:"Cinzel",serif; font-size:13.5px; color:var(--ink-dim);
    white-space:nowrap; letter-spacing:.03em;
  }
  li.act.sel .time{color:var(--gold)}

  /* Info icon on each act */
  button.info{
    width:22px; height:22px; padding:0;
    display:grid; place-items:center;
    font-family:"Cinzel",serif; font-weight:700; font-size:12px; font-style:italic;
    line-height:1; letter-spacing:0; text-transform:none;
    color:var(--ink-dim);
    background:transparent;
    border:1px solid var(--line); border-radius:50%;
    transition:all .16s ease;
  }
  button.info:hover{
    color:#fff; border-color:var(--gold);
    background:radial-gradient(circle at 50% 40%, rgba(184,155,69,.35), transparent 70%);
    box-shadow:0 0 14px rgba(184,155,69,.35);
  }
  li.act.sel button.info{border-color:var(--gold); color:var(--gold)}

  /* ---------- Bio dialog ---------- */
  dialog.bio{
    width:min(680px, 92vw);
    max-height:88vh;
    padding:0; border:none; color:var(--ink);
    background:transparent;
    overflow:hidden;
  }
  dialog.bio::backdrop{
    background:rgba(4,3,6,.72);
    backdrop-filter:blur(4px);
  }
  .bio-card{
    position:relative;
    border:1px solid var(--sel-line);
    box-shadow:0 40px 90px -30px #000, 0 0 40px rgba(143,22,32,.25);
    background:var(--panel);
  }
  /* Reused SVG backdrop from assets/, tinted per-band via --hue */
  .bio-art{
    position:relative;
    height:230px;
    background-image:
      linear-gradient(180deg, rgba(8,8,11,.15), var(--panel) 96%),
      url("assets/band-bg.svg");
    background-size:cover; background-position:center;
    filter:hue-rotate(var(--hue,0deg)) saturate(1.05);
  }
  .bio-art::after{
    content:""; position:absolute; inset:0;
    background:radial-gradient(120% 80% at 50% 0%, rgba(143,22,32,.28), transparent 60%);
    mix-blend-mode:screen;
  }
  /* Real Commons photo: no hue shift, keep faces visible */
  .bio-art.has-photo{ height:280px; filter:none; }
  .bio-art.has-photo::after{
    background:linear-gradient(180deg, rgba(8,8,11,.15) 0%, transparent 35%, rgba(15,15,20,.55) 100%);
    mix-blend-mode:normal;
  }
  .bio-close{
    position:absolute; top:12px; right:12px; z-index:2;
    width:38px; height:38px; padding:0; border-radius:50%;
    font-size:18px; line-height:1;
    background:rgba(8,8,11,.6); border:1px solid var(--sel-line); color:var(--ink);
  }
  .bio-close:hover{border-color:var(--blood-lit); color:#fff; box-shadow:0 0 16px rgba(192,48,60,.5)}
  .bio-body{
    position:relative; z-index:1;
    margin-top:-70px; padding:0 30px 30px;
  }
  .bio-name{
    font-family:"Pirata One","Times New Roman",serif; font-weight:400;
    font-size:clamp(30px,6vw,46px); line-height:1; margin:0;
    color:#efe9dc; text-shadow:0 2px 0 #000, 0 0 26px rgba(160,30,40,.4);
  }
  .bio-meta{
    display:flex; flex-wrap:wrap; gap:8px 16px; align-items:center;
    margin:12px 0 16px;
    font-family:"Cinzel",serif; font-size:12px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--gold);
  }
  .bio-meta .dot{color:var(--sel-line)}
  .bio-text{
    font-size:18px; line-height:1.55; color:var(--ink); margin:0;
  }
  .bio-add{ margin-top:22px; }
  .bio-credit{
    margin:18px 0 0; padding-top:12px;
    border-top:1px solid var(--line);
    font-size:11px; letter-spacing:.04em; color:var(--ink-dim); font-style:italic;
  }
  .bio-credit a{ color:var(--gold); text-decoration:none; border-bottom:1px dotted var(--gold) }
  .bio-credit a:hover{ color:#e8cf7a }

  .foot{
    text-align:center; color:var(--ink-dim); font-size:13px;
    margin-top:40px; font-style:italic;
  }

  /* ---------- Print sheet (screen-hidden) ---------- */
  #sheet{display:none}

  @media print{
    @page{ margin:12mm; size:A4; }
    body{
      background:#fff !important; color:#111 !important;
      font-size:12pt;
    }
    header.masthead, .toolbar, main, .foot{ display:none !important; }
    #sheet{ display:block !important; }

    .p-head{ text-align:center; border-bottom:2px solid #111; padding-bottom:8px; margin-bottom:14px }
    .p-title{
      font-family:"Pirata One","Times New Roman",serif; font-size:30pt; margin:0; color:#111;
    }
    .p-sub{ font-family:"Cinzel",serif; letter-spacing:.24em; text-transform:uppercase; font-size:10pt; color:#333; margin-top:4px }

    .p-day{ margin-bottom:14px; break-inside:avoid }
    .p-day-title{
      font-family:"Cinzel",serif; font-weight:700; text-transform:uppercase; letter-spacing:.14em;
      font-size:14pt; border-bottom:1px solid #111; padding-bottom:3px; margin:0 0 6px;
    }
    table.p-tbl{ width:100%; border-collapse:collapse }
    table.p-tbl td{ padding:5px 6px; border-bottom:1px solid #ccc; vertical-align:top }
    .p-time{ font-family:"Cinzel",serif; white-space:nowrap; width:120px; font-size:11pt; font-weight:500 }
    .p-band{ font-size:13pt; font-weight:500 }
    .p-stage{ text-align:right; color:#555; font-size:10pt; white-space:nowrap; font-style:italic }
    tr.clash td{ background:#f0eaea }
    tr.clash .p-time::after{ content:" ⚠"; color:#8f1620 }
    .p-clash-note{ font-size:9pt; color:#8f1620; font-style:italic; margin-top:2px }
    .p-empty{ text-align:center; font-style:italic; margin-top:30px }
    .p-foot{ text-align:center; font-size:8pt; color:#666; margin-top:18px; border-top:1px solid #ccc; padding-top:6px }
  }

  /* Screen clash warning */
  .clash-banner{
    display:none;
    max-width:1180px; margin:0 auto 6px; padding:10px 16px;
    border:1px solid var(--sel-line); background:rgba(58,18,26,.4);
    color:#e7b8bd; font-size:14px; text-align:center;
  }
  .clash-banner.show{display:block}
  .clash-banner b{color:#ffb3ba}
</style>
</head>
<body>

<header class="masthead">
  <p class="kicker">Cologne · Tanzbrunnen</p>
  <h1 class="title"><span class="amphi">AMPHI</span> FESTIVAL</h1>
  <div class="subtitle">Running Order · MMXXVI</div>
  <div class="rule"></div>
</header>

<div class="toolbar">
  <span class="count-badge"><b id="cnt">0</b> rites chosen</span>
  <button class="primary" id="printBtn">⚰ Print My Lineup</button>
  <button id="clearBtn">Clear All</button>
</div>

<div class="clash-banner" id="clashBanner"></div>

<main>
  <div class="days" id="days"></div>
  <p class="foot">Click a band to mark it. Overlapping sets are flagged so no soul is torn in two.<br>Your selection is remembered on this device.</p>
</main>

<div id="sheet"></div>

<dialog class="bio" id="bioDialog" aria-labelledby="bioName">
  <div class="bio-card">
    <div class="bio-art" id="bioArt"></div>
    <button class="bio-close" id="bioClose" type="button" aria-label="Close">✕</button>
    <div class="bio-body">
      <h2 class="bio-name" id="bioName"></h2>
      <div class="bio-meta" id="bioMeta"></div>
      <p class="bio-text" id="bioText"></p>
      <div class="bio-add">
        <button class="primary" id="bioToggle" type="button"></button>
      </div>
      <p class="bio-credit" id="bioCredit"></p>
    </div>
  </div>
</dialog>

<script>
/* ---------------- Band photos ----------------
   Free-licensed press/live photos from Wikimedia Commons.
   Each REQUIRES visible attribution (shown in the dialog).
   Bands not listed here fall back to the generated SVG backdrop. */

   Each act: [band, start, end, bio]
   Bios are short scene descriptions for the dialog window.        */
const LINEUP = [

  { day:"Sonntag", date:"26 July 2026", stages:[
    { name:"Main Stage", doors:"Doors 10:00", acts:[

      ["Assemblage 23","16:40","17:30","Tom Shear's acclaimed futurepop/EBM project, marrying emotional depth with pristine, propulsive electronics."],

    ]},
    { name:"Orbit Stage", doors:"Doors 13:00", acts:[
      ["KLLSIGNL","13:45","14:30","Dark-electro newcomers with a hard, industrial edge and a menacing club pulse."],
      ["Emmon","15:05","15:50","Swedish synth artist Emma Nylén delivering crisp, emotive electro-pop with an icy Nordic shimmer."],
      ["SIIE","16:25","17:10","Atmospheric electro/industrial project trading in cold textures and brooding introspection."],
      ["Potochkine","17:45","18:40","French dark-electro duo weaving cinematic tension, distorted vocals and noir atmosphere."],
      ["Paradox Obscur","19:15","20:10","Greek minimal-synth duo channelling raw, analogue coldwave straight from the early-'80s underground."],
      ["Rotersand","20:45","21:55","German futurepop favourites closing the Orbit Stage with soulful vocals and euphoric, driving electronics."],

/* ---------------- State ---------------- */
const STORE_KEY = "amphi2026.selection";
const idOf = (day, band) => day + "::" + band;
let selected = new Set();
try{ const s = JSON.parse(localStorage.getItem(STORE_KEY)||"[]"); selected = new Set(s); }catch(e){}

const toMin = t => { const [h,m]=t.split(":").map(Number); return h*60+m; };

/* ---------------- Render main list ---------------- */
const daysEl = document.getElementById("days");
function renderList(){
  daysEl.innerHTML = "";
  LINEUP.forEach(d=>{
    const day = document.createElement("section");
    day.className="day";
    day.innerHTML = `<div class="day-head"><p class="dow">${d.day}</p><div class="date">${d.date}</div></div>`;
    d.stages.forEach(st=>{
      const stage = document.createElement("div");
      stage.className="stage";
      stage.innerHTML = `<div class="stage-head"><span class="stage-name">${st.name}</span><span class="stage-doors">${st.doors}</span></div>`;
      const ul = document.createElement("ul");
      ul.className="acts";
      st.acts.forEach(([band,start,end,bio])=>{
        const id = idOf(d.day, band);
        const li = document.createElement("li");
        li.className = "act" + (selected.has(id) ? " sel":"");
        li.dataset.id = id;
        li.innerHTML = `<span class="mark"></span>`+
          `<span class="band">${band}</span>`+
          `<button class="info" type="button" aria-label="About ${esc(band)}" title="About ${esc(band)}">i</button>`+
          `<span class="time">${start}–${end}</span>`;
        li.addEventListener("click", ()=>toggle(id, li));
        li.querySelector(".info").addEventListener("click", ev=>{
          ev.stopPropagation();
          openBio(band, st.name, `${start}–${end}`, d.day, bio);
        });
        ul.appendChild(li);
      });
      stage.appendChild(ul);
      day.appendChild(stage);
    });
    daysEl.appendChild(day);
  });
}

function toggle(id, li){
  if(selected.has(id)){ selected.delete(id); li.classList.remove("sel"); }
  else{ selected.add(id); li.classList.add("sel"); }
  persist(); refresh();
}
function persist(){ localStorage.setItem(STORE_KEY, JSON.stringify([...selected])); }

/* ---------------- Selection summary + clashes ---------------- */
function collectSelected(){
  const rows = [];
  LINEUP.forEach(d=> d.stages.forEach(st=> st.acts.forEach(([band,start,end])=>{
    const id = idOf(d.day, band);
    if(selected.has(id)) rows.push({day:d.day, date:d.date, band, start, end, stage:st.name, s:toMin(start), e:toMin(end)});
  })));
  return rows;
}
// returns set of row indices that overlap another selected row on the same day
function findClashes(rows){
  const clash = new Set();
  for(let i=0;i<rows.length;i++){
    for(let j=i+1;j<rows.length;j++){
      if(rows[i].day!==rows[j].day) continue;
      if(rows[i].s < rows[j].e && rows[j].s < rows[i].e){ clash.add(i); clash.add(j); }
    }
  }
  return clash;
}

function refresh(){
  const rows = collectSelected();
  document.getElementById("cnt").textContent = rows.length;
  const clash = findClashes(rows);

  // Flag the exact clashing bands in the on-screen list
  const clashIds = new Set([...clash].map(i => idOf(rows[i].day, rows[i].band)));
  daysEl.querySelectorAll("li.act").forEach(li=>{
    li.classList.toggle("clash", clashIds.has(li.dataset.id));
  });

  const banner = document.getElementById("clashBanner");
  if(clash.size){
    const pairs = [...clash].map(i=>rows[i].band);
    banner.classList.add("show");
    banner.innerHTML = `<b>⚠ Time conflict:</b> ${pairs.join(" · ")} overlap. You cannot be in two crypts at once.`;
  } else {
    banner.classList.remove("show");
    banner.innerHTML = "";
  }
  buildSheet(rows, clash);
}

/* ---------------- Build print sheet ---------------- */
function buildSheet(rows, clash){
  const sheet = document.getElementById("sheet");
  let html = `<div class="p-head"><h1 class="p-title">Amphi Festival 2026</h1><div class="p-sub">My Running Order · Cologne</div></div>`;

  if(!rows.length){
    html += `<p class="p-empty">No bands selected — choose your rites before printing.</p>`;
    sheet.innerHTML = html;
    return;
  }

  // index map so we know clash status after sorting
  const withClash = rows.map((r,i)=>({...r, clash:clash.has(i)}));

  LINEUP.forEach(d=>{
    const dayRows = withClash.filter(r=>r.day===d.day).sort((a,b)=>a.s-b.s);
    if(!dayRows.length) return;
    html += `<div class="p-day"><h2 class="p-day-title">${d.day} · ${d.date}</h2><table class="p-tbl">`;
    dayRows.forEach(r=>{
      html += `<tr class="${r.clash?'clash':''}">`+
              `<td class="p-time">${r.start}–${r.end}</td>`+
              `<td class="p-band">${r.band}</td>`+
              `<td class="p-stage">${r.stage}</td></tr>`;
    });
    html += `</table></div>`;
  });

  if(clash.size){
    html += `<p class="p-clash-note">⚠ Shaded rows overlap in time — plan your crossings.</p>`;
  }
  html += `<div class="p-foot">Generated from the official Amphi Festival 2026 Running Order</div>`;
  sheet.innerHTML = html;
}

/* ---------------- Buttons ---------------- */
document.getElementById("printBtn").addEventListener("click", ()=>{
  if(!selected.size){ alert("Select at least one band before printing your lineup."); return; }
  window.print();
});
document.getElementById("clearBtn").addEventListener("click", ()=>{
  if(!selected.size) return;
  if(!confirm("Clear all selected bands?")) return;
  selected.clear(); persist(); renderList(); refresh();
});

/* ---------------- Bio dialog ---------------- */
const esc = s => s.replace(/[&<>"']/g, c => (
  {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]
));
// Stable per-band hue so each backdrop feels distinct while reusing one asset
function hueFor(str){
  let h = 0;
  for(let i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) & 0xffff; }
  return h % 360;
}

const dlg = document.getElementById("bioDialog");
let bioCurrentId = null;

function openBio(band, stage, time, day, bio){
  bioCurrentId = idOf(day, band);
  const art = document.getElementById("bioArt");
  const credit = document.getElementById("bioCredit");
  const photo = BAND_PHOTOS[band];
  if(photo){
    // real Commons photo — no hue shift, show required attribution
    art.classList.add("has-photo");
    art.style.removeProperty("--hue");
    art.style.backgroundImage =
      `linear-gradient(180deg, rgba(8,8,11,.05), var(--panel) 97%), url("assets/bands/${photo.file}")`;
    const who = esc(photo.by || "Unknown");
    const lic = photo.url
      ? `<a href="${esc(photo.url)}" target="_blank" rel="noopener">${esc(photo.license)}</a>`
      : esc(photo.license);
    credit.innerHTML = `Photo: ${who} · ${lic} · via Wikimedia Commons`;
    credit.style.display = "";
  } else {
    // fallback: reusable SVG backdrop, tinted per band
    art.classList.remove("has-photo");
    art.style.backgroundImage = "";
    art.style.setProperty("--hue", hueFor(band) + "deg");
    credit.style.display = "none";
    credit.innerHTML = "";
  }
  document.getElementById("bioName").textContent = band;
  document.getElementById("bioMeta").innerHTML =
    `<span>${esc(day)}</span><span class="dot">✦</span>`+
    `<span>${esc(stage)}</span><span class="dot">✦</span><span>${esc(time)}</span>`;
  document.getElementById("bioText").textContent = bio || "Bio coming soon.";
  syncBioToggle();
  if(!dlg.open) dlg.showModal();
}

function syncBioToggle(){
  const btn = document.getElementById("bioToggle");
  const on = selected.has(bioCurrentId);
  btn.textContent = on ? "✝ In your lineup — remove" : "✝ Add to my lineup";
  btn.classList.toggle("primary", !on);
}

document.getElementById("bioToggle").addEventListener("click", ()=>{
  if(!bioCurrentId) return;
  const li = daysEl.querySelector(`li.act[data-id="${CSS.escape(bioCurrentId)}"]`);
  if(li) toggle(bioCurrentId, li);
  syncBioToggle();
});

document.getElementById("bioClose").addEventListener("click", ()=> dlg.close());
// Click on the backdrop (outside the card) closes the dialog
dlg.addEventListener("click", ev=>{ if(ev.target === dlg) dlg.close(); });

/* ---------------- Init ---------------- */
renderList();
refresh();
</script>
